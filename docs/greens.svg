<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg width="100%" height="100%" viewBox="0 0 1000 1000" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" xml:space="preserve" style="fill-rule:evenodd;clip-rule:evenodd;stroke-linejoin:round;stroke-miterlimit:2;">
  <g transform="matrix(1,0,0,1,4.11366,-1.09083)">
    <ellipse cx="133.788" cy="883.312" rx="115.159" ry="74.707" style="fill:rgb(0,255,0);" opacity="0">
      <animate id="anim1" attributeName="opacity" to="1" dur="0.15s" begin="0s; reset.end" fill="freeze" />
    </ellipse>
  </g>

 <g transform="matrix(0.881639,0,0,0.881639,245.958,-152.848)">
    <ellipse cx="133.788" cy="883.312" rx="115.159" ry="74.707" style="fill:rgb(0,255,0);" opacity="0">
      <animate id="anim2" attributeName="opacity" to="1" dur="0.15s" begin="anim1.end + 0.1s" fill="freeze" />
    </ellipse>
  </g>

  <g transform="matrix(0.810688,0,0,0.810688,479.109,-299.531)">
    <ellipse cx="133.788" cy="883.312" rx="115.159" ry="74.707" style="fill:rgb(0,255,0);" opacity="0">
      <animate id="anim3" attributeName="opacity" to="1" dur="0.15s" begin="anim2.end + 0.1s" fill="freeze" />
    </ellipse>
  </g>

  <g transform="matrix(0.700284,0,0,0.700284,674.486,-373.574)">
    <ellipse cx="133.788" cy="883.312" rx="115.159" ry="74.707" style="fill:rgb(0,255,0);" opacity="0">
      <animate id="anim4" attributeName="opacity" to="1" dur="0.15s" begin="anim3.end + 0.1s" fill="freeze" />
    </ellipse>
  </g>

  <g transform="matrix(0.600655,0,0,0.600655,836.275,-440.522)">
    <ellipse cx="133.788" cy="883.312" rx="115.159" ry="74.707" style="fill:rgb(0,255,0);" opacity="0">
      <animate id="anim5" attributeName="opacity" to="1" dur="0.15s" begin="anim4.end + 0.1s" fill="freeze" />
    </ellipse>
  </g>

  <!-- Reset (Fades them all out together after a pause) -->
  <animate id="reset" attributeName="display" to="none" dur="0.1s" begin="anim5.end + 1s" fill="remove" />
</svg>